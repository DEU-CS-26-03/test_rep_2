services:
  python-app:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: capstone-python
    ports:
      - "8000:8000"
    environment:
      USE_MOCK: ${USE_MOCK:-true}
      TZ: Asia/Seoul
    volumes:
      - ./python/workspace/uploads:/app/workspace/uploads
      - ./python/workspace/results:/app/workspace/results
      - ./python/workspace/temp:/app/workspace/temp
      - ./python/mock:/app/mock
      - ./python/models:/app/models
    depends_on:
      redis:
        condition: service_healthy

        
    networks:
      - capstone-net

  spring-app:
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-app:
        condition: service_started
    environment:
      PYTHON_SERVICE_URL: http://python-app:8000
